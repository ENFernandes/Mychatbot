name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # Backend: type-check + lint + build
  # ─────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint -- --max-warnings 150

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────
  # Frontend: type-check + lint + build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint -- --max-warnings 150

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────
  # Docker: valida que os builds de imagem funcionam
  # ─────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mychatbot-backend ./backend

      - name: Build frontend image
        run: docker build -t mychatbot-frontend ./frontend

      - name: Build database image
        run: docker build -t mychatbot-database ./database